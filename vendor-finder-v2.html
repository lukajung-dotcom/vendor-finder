<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Finder — Brand Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  :root {
    /* Core palette — warm off-white editorial */
    --bg: #F6F5F1;
    --bg-grain: #F1F0EB;
    --surface: #FBFAF7;
    --surface-elevated: #FFFFFF;

    --ink-1: #13130F;
    --ink-2: #4A4A42;
    --ink-3: #8A8A80;
    --ink-4: #B8B7AD;

    --line: #E5E3DA;
    --line-strong: #D4D2C6;
    --line-hover: #B8B6A8;

    /* Accent — muted cobalt */
    --accent: #1E40AF;
    --accent-hover: #1E3A8A;
    --accent-soft: #EEF1FA;
    --accent-line: #C9D2ED;

    /* Semantic — desaturated editorial */
    --sage: #4A6B3E;
    --sage-soft: #EEF3E8;
    --amber: #8B6914;
    --amber-soft: #F5EFDF;
    --rust: #8B3A1F;
    --rust-soft: #F3E4DD;

    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 16px;

    --serif: 'Instrument Serif', 'Noto Serif KR', Georgia, serif;
    --sans: 'Pretendard Variable', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0E0E0C;
      --bg-grain: #121210;
      --surface: #161613;
      --surface-elevated: #1C1C18;

      --ink-1: #F4F3EE;
      --ink-2: #B8B7AC;
      --ink-3: #7A7970;
      --ink-4: #4A4944;

      --line: #242420;
      --line-strong: #2E2E29;
      --line-hover: #3A3A34;

      --accent: #93B4FF;
      --accent-hover: #B5CCFF;
      --accent-soft: #1A2238;
      --accent-line: #2A3658;

      --sage: #A8C89A;
      --sage-soft: #1A231A;
      --amber: #D4B87A;
      --amber-soft: #26200F;
      --rust: #D89985;
      --rust-soft: #261813;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink-1);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(30, 64, 175, 0.04), transparent),
      radial-gradient(ellipse 60% 30% at 0% 100%, rgba(139, 105, 20, 0.03), transparent);
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 5rem 2rem 6rem;
  }

  /* ── Header ── */
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 1.25rem;
    animation: fadeUp 0.6s var(--ease) both;
  }
  .eyebrow::before {
    content: "";
    width: 24px;
    height: 1px;
    background: var(--ink-3);
  }

  .title {
    font-family: var(--serif);
    font-size: clamp(40px, 6vw, 56px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink-1);
    margin-bottom: 0.75rem;
    animation: fadeUp 0.7s var(--ease) 0.05s both;
  }
  .title em {
    font-style: italic;
    color: var(--ink-2);
  }

  .subtitle {
    font-size: 15px;
    color: var(--ink-2);
    max-width: 480px;
    margin-bottom: 3.5rem;
    animation: fadeUp 0.7s var(--ease) 0.1s both;
  }

  /* ── Filter sections ── */
  .filters {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    padding: 1.75rem 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 2rem;
    animation: fadeUp 0.7s var(--ease) 0.15s both;
  }

  .filter-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  .filter-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    padding-top: 9px;
  }
  .filter-label .count {
    color: var(--ink-4);
    margin-left: 4px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    font-family: inherit;
    font-size: 13px;
    font-weight: 450;
    padding: 7px 13px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: transparent;
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.25s var(--ease);
    user-select: none;
    letter-spacing: -0.005em;
  }
  .chip:hover {
    border-color: var(--line-hover);
    color: var(--ink-1);
    transform: translateY(-1px);
  }
  .chip.active {
    background: var(--ink-1);
    color: var(--bg);
    border-color: var(--ink-1);
  }

  /* Budget slider */
  .budget-track {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-top: 4px;
  }
  .budget-track input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: var(--line-strong);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .budget-track input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    background: var(--surface-elevated);
    border: 1.5px solid var(--ink-1);
    border-radius: 50%;
    cursor: grab;
    transition: all 0.2s var(--ease);
  }
  .budget-track input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
    box-shadow: 0 0 0 6px rgba(30, 64, 175, 0.08);
  }
  .budget-track input[type=range]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: var(--surface-elevated);
    border: 1.5px solid var(--ink-1);
    border-radius: 50%;
    cursor: grab;
  }
  .budget-val {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    min-width: 110px;
    text-align: right;
    color: var(--ink-1);
    font-variant-numeric: tabular-nums;
  }

  /* Toggle switch */
  .switch {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    padding: 6px 0;
  }
  .switch input { display: none; }
  .switch-track {
    position: relative;
    width: 32px;
    height: 18px;
    background: var(--line-strong);
    border-radius: 100px;
    transition: background 0.25s var(--ease);
    flex-shrink: 0;
  }
  .switch-track::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: var(--surface-elevated);
    border-radius: 50%;
    transition: transform 0.3s var(--ease);
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
  .switch input:checked + .switch-track {
    background: var(--ink-1);
  }
  .switch input:checked + .switch-track::after {
    transform: translateX(14px);
  }
  .switch-text {
    font-size: 13px;
    color: var(--ink-2);
  }

  /* ── Results meta ── */
  .results-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1.25rem;
    animation: fadeUp 0.6s var(--ease) 0.25s both;
  }
  .results-count {
    font-family: var(--serif);
    font-size: 22px;
    font-style: italic;
    color: var(--ink-1);
    letter-spacing: -0.01em;
  }
  .results-count .num {
    font-style: normal;
    font-family: var(--sans);
    font-weight: 500;
    margin-right: 2px;
  }
  .results-hint {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-4);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .refresh-btn {
    width: 22px;
    height: 22px;
    border: 1px solid var(--line);
    border-radius: 50%;
    background: var(--surface);
    color: var(--ink-2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all 0.2s var(--ease);
    flex-shrink: 0;
  }
  .refresh-btn svg { width: 12px; height: 12px; }
  .refresh-btn:hover {
    border-color: var(--ink-1);
    color: var(--ink-1);
    transform: rotate(-30deg);
  }
  .refresh-btn.spinning {
    animation: spin 0.8s linear infinite;
    pointer-events: none;
    color: var(--accent);
    border-color: var(--accent);
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ── Vendor cards ── */
  .vendor-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .vendor-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 1.35rem 1.5rem;
    transition: all 0.35s var(--ease);
    animation: cardIn 0.5s var(--ease) both;
    overflow: hidden;
  }
  .vendor-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, transparent, transparent);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s var(--ease);
  }
  .vendor-card:hover {
    border-color: var(--line-hover);
    transform: translateY(-2px);
    box-shadow:
      0 1px 2px rgba(0,0,0,0.03),
      0 8px 24px -8px rgba(0,0,0,0.08);
  }
  .vendor-card.recommended {
    background: var(--surface-elevated);
  }
  .vendor-card.recommended::before {
    background: linear-gradient(135deg, var(--accent-line), transparent 50%);
    opacity: 1;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 10px;
  }
  .vendor-name-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .vendor-name {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--ink-1);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    padding: 3px 9px 3px 7px;
    border-radius: 100px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge::before {
    content: "";
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge-green { background: var(--sage-soft); color: var(--sage); }
  .badge-orange { background: var(--amber-soft); color: var(--amber); }
  .badge-warn { background: var(--rust-soft); color: var(--rust); }

  .card-price {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    color: var(--ink-1);
    font-variant-numeric: tabular-nums;
    text-align: right;
    letter-spacing: -0.01em;
  }
  .card-price.unset {
    color: var(--ink-4);
    font-weight: 400;
    font-style: italic;
    font-family: var(--serif);
    font-size: 15px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }
  .tag {
    font-size: 11px;
    padding: 2px 9px;
    color: var(--ink-3);
    border: 1px solid var(--line);
    border-radius: 100px;
    background: transparent;
    letter-spacing: -0.005em;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 18px;
    font-size: 13px;
    color: var(--ink-2);
    margin-bottom: 8px;
  }
  .card-meta .meta-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .card-meta .meta-key {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-4);
  }

  .card-note {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .card-project {
    font-size: 12px;
    color: var(--ink-3);
    font-style: italic;
    font-family: var(--serif);
    line-height: 1.3;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .notion-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-2);
    text-decoration: none;
    transition: all 0.2s var(--ease);
    flex-shrink: 0;
  }
  .notion-link:hover {
    color: var(--accent);
    gap: 8px;
  }
  .notion-link svg {
    width: 10px;
    height: 10px;
    transition: transform 0.2s var(--ease);
  }
  .notion-link:hover svg {
    transform: translate(1px, -1px);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 5rem 1rem;
    animation: fadeUp 0.5s var(--ease);
  }
  .empty-state .empty-mark {
    font-family: var(--serif);
    font-style: italic;
    font-size: 64px;
    color: var(--line-strong);
    line-height: 1;
    margin-bottom: 1rem;
  }
  .empty-state p {
    font-family: var(--serif);
    font-size: 20px;
    font-style: italic;
    color: var(--ink-3);
    margin-bottom: 4px;
  }
  .empty-state small {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-4);
  }

  /* Footer mark */
  .footer-mark {
    margin-top: 4rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-4);
  }

  /* ── Vendor card click affordance ── */
  .vendor-card { cursor: pointer; }
  .vendor-card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ── Side panel ── */
  .panel-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(13, 13, 12, 0.32);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s var(--ease);
    z-index: 50;
  }
  .panel-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }

  .panel {
    position: fixed;
    top: 0;
    right: 0;
    height: 100vh;
    width: min(460px, 92vw);
    background: var(--surface-elevated);
    border-left: 1px solid var(--line);
    box-shadow: -24px 0 48px -24px rgba(0,0,0,0.18);
    transform: translateX(100%);
    transition: transform 0.45s var(--ease);
    z-index: 51;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel.open { transform: translateX(0); }

  .panel-header {
    padding: 1.75rem 1.75rem 1.25rem;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .panel-eyebrow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 12px;
  }
  .panel-close {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 4px 11px 5px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.2s var(--ease);
  }
  .panel-close:hover {
    border-color: var(--ink-1);
    color: var(--ink-1);
  }
  .panel-name {
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink-1);
    margin-bottom: 10px;
  }
  .panel-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .panel-body {
    padding: 1.5rem 1.75rem 2rem;
    overflow-y: auto;
    flex: 1;
  }
  .panel-section {
    margin-bottom: 2rem;
  }
  .panel-section:last-child { margin-bottom: 0; }
  .panel-section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-section-title::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .contact-row {
    display: grid;
    grid-template-columns: 16px 1fr;
    gap: 12px;
    align-items: start;
    padding: 9px 0;
    font-size: 14px;
    color: var(--ink-1);
    border-bottom: 1px dashed var(--line);
  }
  .contact-row:last-child { border-bottom: none; }
  .contact-row svg {
    width: 14px;
    height: 14px;
    color: var(--ink-3);
    margin-top: 4px;
  }
  .contact-row a {
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
  }
  .contact-row a:hover { text-decoration: underline; }
  .contact-row .key {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-4);
    display: block;
    margin-bottom: 2px;
  }
  .contact-empty {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-3);
    line-height: 1.6;
    padding: 14px 0;
  }
  .contact-empty code {
    font-family: var(--mono);
    font-style: normal;
    font-size: 11px;
    background: var(--bg-grain);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--ink-2);
  }

  .panel-memo {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.6;
    padding: 12px 14px;
    background: var(--bg-grain);
    border-radius: var(--radius);
    margin-top: 10px;
  }

  .history-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px 16px;
    padding: 12px 0;
    border-bottom: 1px dashed var(--line);
  }
  .history-item:last-child { border-bottom: none; }
  .history-project {
    font-size: 13px;
    color: var(--ink-1);
    line-height: 1.4;
  }
  .history-meta {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-4);
    margin-top: 3px;
  }
  .history-price {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-1);
    text-align: right;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .history-price.unset {
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-4);
    font-size: 13px;
  }

  /* ── Attached files inside history items ── */

// 처음엔 인라인 스냅샷으로 시작 → 서버가 있으면 fetch 로 덮어씀
let DATA = SNAPSHOT.slice();
let lastSync = new Date();
let syncSource = "snapshot";
let isRefreshing = false;

const POLL_MS = 3_000; // 3초마다 폴링 (서버 캐시 2초)
// file:// 모드에서 시도할 서버 후보 (npm start 가 떠 있으면 자동 연결)
const SERVER_FALLBACKS = ["http://localhost:5173", "http://127.0.0.1:5173"];

async function tryServerFetch(base, force) {
  const path = "/api/vendors" + (force ? "?force=1" : "");
  const url = base + path;
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadVendors({ force = false } = {}) {
  // 1) 같은 origin (서버 모드, http://localhost:5173 으로 접속한 경우)
  if (location.protocol !== "file:") {
    try {
      const json = await tryServerFetch("", force);
      syncSource = json.source === "live" ? "live" : "snapshot";
      return json.vendors || [];
    } catch (e) { /* fall through */ }
  }
  // 2) file:// 모드: localhost 후보를 순차 시도 (서버가 켜져 있으면 자동 연결됨)
  if (location.protocol === "file:") {
    for (const base of SERVER_FALLBACKS) {
      try {
        const json = await tryServerFetch(base, force);
        syncSource = json.source === "live" ? "live" : "snapshot";
        return json.vendors || [];
      } catch (e) { /* try next */ }
    }
  }
  // 3) 둘 다 실패 → 인라인 스냅샷 유지
  return null;
}

function updateSyncStatus() {
  const el = document.getElementById("syncStatus");
  if (!el) return;
  const time = lastSync
    ? lastSync.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" })
    : "—";
  if (syncSource === "live") {
    el.innerHTML = `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#4A6B3E;margin-right:5px;"></span>LIVE · ${time}`;
  } else if (syncSource === "snapshot") {
    el.innerHTML = `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#8B6914;margin-right:5px;"></span>SNAPSHOT · ${time}`;
  } else if (syncSource === "error") {
    el.innerHTML = `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#8B3A1F;margin-right:5px;"></span>OFFLINE`;
  } else {
    el.textContent = "Loading…";
  }
}

async function refresh(opts = {}) {
  if (isRefreshing) return;
  isRefreshing = true;
  const btn = document.getElementById("refreshBtn");
  if (btn) btn.classList.add("spinning");

  try {
    const next = await loadVendors({ force: opts.force });
    if (next === null) {
      // fetch 안 했거나 실패 — 인라인 스냅샷 유지
      if (opts.force) render();
      return;
    }
    const sig = (arr) => arr.map((d) => `${d.id || d.url}:${d.lastEdited || ""}`).join("|");
    const changed = sig(next) !== sig(DATA);
    DATA = next;
    lastSync = new Date();
    updateSyncStatus();
    if (changed || opts.force) render();
  } finally {
    isRefreshing = false;
    if (btn) btn.classList.remove("spinning");
  }
}

function fmt(n) {
  if (!n) return { text: "TBD", unset: true };
  return { text: "KRW " + new Intl.NumberFormat("en-US").format(n), unset: false };
}

function statusBadge(s) {
  if (s === "green") return '<span class="badge badge-green">Recommended</span>';
  if (s === "orange") return '<span class="badge badge-orange">Quote only</span>';
  if (s === "warn") return '<span class="badge badge-warn">Flagged</span>';
  return "";
}

function render() {
  let filtered = DATA.filter(d => {
    if (state.cat !== "all" && !d.cat.includes(state.cat)) return false;
    if (d.price && d.price > state.budget && state.budget < 110000000) return false;
    if (state.recOnly && d.status !== "green") return false;
    return true;
  });

  filtered.sort((a, b) => {
    const sOrd = { green: 0, orange: 1, none: 2, warn: 3 };
    if (sOrd[a.status] !== sOrd[b.status]) return sOrd[a.status] - sOrd[b.status];
    return (b.price || 0) - (a.price || 0);
  });

  const n = filtered.length;
  document.getElementById("resultCount").innerHTML =
    `<span class="num">${String(n).padStart(2, "0")}</span> ${n === 1 ? "result" : "results"} <em>found</em>`;

  const container = document.getElementById("results");
  if (n === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-mark">∅</div>
        <p>조건에 맞는 업체가 없습니다</p>
        <small>Try adjusting the filters</small>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map((d, i) => {
    const isRec = d.status === "green";
    const priceObj = fmt(d.price);
    return `
      <article class="vendor-card${isRec ? " recommended" : ""}" style="animation-delay: ${i * 0.04}s" data-vendor="${escapeAttr(d.name)}" tabindex="0" role="button" aria-label="${escapeAttr(d.name)} 상세 보기">
        <div class="card-top">
          <div class="vendor-name-wrap">
            <span class="vendor-name">${d.name}</span>
            ${statusBadge(d.status)}
          </div>
          <div class="card-price${priceObj.unset ? " unset" : ""}">${priceObj.text}</div>
        </div>
        ${d.cat.length ? `<div class="card-tags">${d.cat.map(c => `<span class="tag">${c}</span>`).join("")}</div>` : ""}
        <div class="card-meta">
          ${d.duration ? `<span class="meta-item"><span class="meta-key">Lead</span> ${d.duration}</span>` : ""}
        </div>
        ${d.note ? `<div class="card-note">${d.note}</div>` : ""}
        <div class="card-footer">
          <div class="card-project">— ${d.project}</div>
          <a class="notion-link" href="${d.url}" target="_blank" rel="noopener" data-stop="1">
            View in Notion
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h7v7"/><path d="M13 3L6 10"/></svg>
          </a>
        </div>
      </article>
    `;
  }).join("");
}

function fileIconLabel(kind) {
  if (kind === "pdf") return "PDF";
  if (kind === "image") return "IMG";
  if (kind === "spreadsheet") return "XLS";
  if (kind === "doc") return "DOC";
  return "FILE";
}

function renderQuoteFiles(q) {
  // 실제 첨부 파일이 있을 때만 노출 — 없으면 행 자체가 사라짐
  // 다운로드는 /api/file 프록시가 처리하므로 서버 모드에서만 동작
  if (!Array.isArray(q.files) || q.files.length === 0) return "";
  if (location.protocol === "file:") return "";

  const rows = q.files.map((f) => {
    const safeName = escapeHtml(f.name);
    const kind = f.kind || "other";
    const params = new URLSearchParams({ pageId: q.id, name: f.name });
    const viewUrl = `/api/file?${params.toString()}&action=view`;
    const downloadUrl = `/api/file?${params.toString()}&action=download`;
    return `
      <div class="file-row">
        <span class="file-icon ${kind}">${fileIconLabel(kind)}</span>
        <a class="file-name" href="${escapeAttr(viewUrl)}" target="_blank" rel="noopener" title="새 창에서 미리보기">${safeName}</a>
        <div class="file-actions">
          <a class="file-btn" href="${escapeAttr(viewUrl)}" target="_blank" rel="noopener">열기</a>
          <a class="file-btn" href="${escapeAttr(downloadUrl)}" download="${escapeAttr(f.name)}">다운로드 ↓</a>
        </div>
      </div>
    `;
  }).join("");
  return `<div class="history-files">${rows}</div>`;
}

function statusBadgeBig(s) {
  if (s === "green") return '<span class="badge badge-green">Recommended</span>';
  if (s === "orange") return '<span class="badge badge-orange">Quote only</span>';
  if (s === "warn") return '<span class="badge badge-warn">Flagged</span>';
  return '<span class="badge" style="background:var(--bg-grain);color:var(--ink-3);">Logged</span>';
}

function renderContact(contact) {
  if (!contact) {
    return `<div class="contact-empty">아직 등록된 연락처가 없습니다.<br><code>contacts.json</code> 또는 HTML <code>CONTACTS</code> 객체에 추가하세요.</div>`;
  }
  const rows = [];
  if (contact.manager) {
    rows.push(`<div class="contact-row">${ICON.user}<div><span class="key">담당</span>${escapeHtml(contact.manager)}</div></div>`);
  }
  if (contact.phone) {
    const tel = contact.phone.replace(/[^0-9+]/g, "");
    rows.push(`<div class="contact-row">${ICON.phone}<div><span class="key">Phone</span><a href="tel:${escapeAttr(tel)}">${escapeHtml(contact.phone)}</a></div></div>`);
  }
  if (contact.email) {
    rows.push(`<div class="contact-row">${ICON.mail}<div><span class="key">Email</span><a href="mailto:${escapeAttr(contact.email)}">${escapeHtml(contact.email)}</a></div></div>`);
  }
  if (contact.homepage) {
    const href = contact.homepage.startsWith("http") ? contact.homepage : `https://${contact.homepage}`;
    const display = contact.homepage.replace(/^https?:\/\//, "");
    rows.push(`<div class="contact-row">${ICON.link}<div><span class="key">Homepage</span><a href="${escapeAttr(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(display)} ↗</a></div></div>`);
  }
  const memo = contact.memo ? `<div class="panel-memo">${escapeHtml(contact.memo)}</div>` : "";
  if (rows.length === 0) {
    return `<div class="contact-empty">연락처 항목이 비어 있습니다. 메모만 등록되어 있어요.</div>${memo}`;
  }
  return rows.join("") + memo;
}

function openPanel(vendorName) {
  const quotes = DATA.filter((d) => d.name === vendorName);
  if (quotes.length === 0) return;

  const contact = getContact(vendorName);
  const primaryStatus = quotes.find((q) => q.status === "green")?.status
    || quotes.find((q) => q.status === "orange")?.status
    || quotes[0].status;

  const allCats = [...new Set(quotes.flatMap((q) => q.cat))];

  const historyHtml = quotes.map((q) => {
    const priceObj = fmt(q.price);
    return `
      <div class="history-item">
        <div>
          <div class="history-project">${escapeHtml(q.project)}</div>
          <div class="history-meta">${q.duration ? escapeHtml(q.duration) + " · " : ""}${q.cat.join(" / ")}</div>
        </div>
        <a class="history-price${priceObj.unset ? " unset" : ""}" href="${escapeAttr(q.url)}" target="_blank" rel="noopener" style="text-decoration:none;">${priceObj.text}</a>
        ${renderQuoteFiles(q)}
      </div>
    `;
  }).join("");

  const tagsHtml = allCats.map((t) => `<span class="tag">${escapeHtml(t)}</span>`).join("");

  document.getElementById("panelContent").innerHTML = `
    <div class="panel-header">
      <div class="panel-eyebrow">
        <span>Vendor / ${quotes.length} ${quotes.length === 1 ? "quote" : "quotes"}</span>
        <button class="panel-close" id="panelCloseBtn">Close ✕</button>
      </div>
      <h2 class="panel-name" id="panelName">${escapeHtml(vendorName)}</h2>
      <div>${statusBadgeBig(primaryStatus)}</div>
      ${tagsHtml ? `<div class="panel-tags">${tagsHtml}</div>` : ""}
    </div>
    <div class="panel-body">
      <section class="panel-section">
        <div class="panel-section-title">Contact</div>
        ${renderContact(contact)}
      </section>
      <section class="panel-section">
        <div class="panel-section-title">History · ${quotes.length}</div>
        ${historyHtml}
      </section>
    </div>
    <div class="panel-footer">
      <a class="panel-cta" href="${escapeAttr(quotes[0].url)}" target="_blank" rel="noopener">
        Open first quote in Notion ${ICON.ext}
      </a>
    </div>
  `;

  document.getElementById("panel").classList.add("open");
  document.getElementById("panel").setAttribute("aria-hidden", "false");
  document.getElementById("panelBackdrop").classList.add("open");
  document.body.style.overflow = "hidden";

  document.getElementById("panelCloseBtn").addEventListener("click", closePanel);
}

function closePanel() {
  document.getElementById("panel").classList.remove("open");
  document.getElementById("panel").setAttribute("aria-hidden", "true");
  document.getElementById("panelBackdrop").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("panelBackdrop").addEventListener("click", closePanel);
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closePanel();
});

document.getElementById("results").addEventListener("click", (e) => {
  if (e.target.closest("[data-stop]")) return; // Notion 링크는 통과
  const card = e.target.closest(".vendor-card");
  if (!card) return;
  const name = card.getAttribute("data-vendor");
  if (name) openPanel(name);

  if (e.key !== "Enter" && e.key !== " ") return;
  const card = e.target.closest(".vendor-card");
  if (!card) return;
  e.preventDefault();
  openPanel(card.getAttribute("data-vendor"));
});

      btn.classList.add("active");
      state[stateKey] = btn.dataset.val;
      render();

  });
}

  const v = parseInt(slider.value);
  state.budget = v;
  budgetVal.textContent = v >= 110000000
    ? "NO LIMIT"
    : "≤ " + new Intl.NumberFormat("en-US").format(v);
  render();
});

document.getElementById("recOnly").addEventListener("change", e => {
  state.recOnly = e.target.checked;
  render();
});

// Footer date
const now = new Date();
document.getElementById("footerDate").textContent =
  now.toISOString().slice(0, 10).replace(/-/g, ".");

// 초기 렌더: 인라인 스냅샷으로 즉시 표시 → 서버 있으면 덮어쓰기
updateSyncStatus();
render();
refresh({ force: true });

// 수동 새로고침 버튼 — 캐시 우회 (force=1)
document.getElementById("refreshBtn").addEventListener("click", () => {
  refresh({ force: true });
});
// ⌘R 대신 R 키 단축키
document.addEventListener("keydown", (e) => {
  if (e.key === "r" && !e.metaKey && !e.ctrlKey && !e.altKey &&
      !["INPUT", "TEXTAREA"].includes(document.activeElement?.tagName)) {
    e.preventDefault();
    refresh({ force: true });
  }
});

// 폴링 (file:// 모드에서도 localhost 서버에 자동 연결 시도)
setInterval(refresh, POLL_MS);
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) refresh({ force: true });
});
window.addEventListener("focus", () => refresh({ force: true }));
</script>
</body>
</html>
